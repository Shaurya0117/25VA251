<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Amazon Clone</title>
    <script type="text/javascript">
        // GitHub Pages SPA redirect - redirect all traffic to index.html
        var path = location.pathname;
        var parts = path.split('/').filter(Boolean);
        
        // If coming from 404, redirect to base with hash
        if (parts.length > 1) {
            var hash = '/' + parts.slice(1).join('/');
            location.replace('/25VA251/#' + hash);
        } else {
            location.replace('/25VA251/');
        }
    </script>
</head>
<body>
</body>
</html>
