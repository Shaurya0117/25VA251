Student marks and grade calculator :
 create a web application that take number of subjects as input uses a loop to enter marks calculate total and averge marks.


<!DOCTYPE html>
<html>
<head>
    <title>Student Marks and Grade Calculator</title>
</head>
<body>

<h2>Student Marks and Grade Calculator</h2>

<script>
    let n = parseInt(prompt("Enter number of subjects:"));

    let total = 0;

    for(let i = 1; i <= n; i++) {
        let marks = parseFloat(prompt("Enter marks for Subject " + i + ":"));
        total += marks;
    }

    let average = total / n;
    let grade;

    if(average >= 90)
        grade = "A+";
    else if(average >= 80)
        grade = "A";
    else if(average >= 70)
        grade = "B";
    else if(average >= 60)
        grade = "C";
    else if(average >= 50)
        grade = "D";
    else
        grade = "F";

    document.write("<h3>Result</h3>");
    document.write("Total Marks: " + total + "<br>");
    document.write("Average Marks: " + average.toFixed(2) + "<br>");
    document.write("Grade: " + grade);
</script>

</body>
</html>
