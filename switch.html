<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <script>
        let day = 4;
        switch (day) {
            case 1:
                document.write("tommrow is monday");
                break;

            case 2:
                document.write("tommarow is thuesday");
                break;

            case 3:
                document.write("tommarow is wednesday");
                break;
            default:
                document.write("invalid day");
        }
    </script>
</body>

</html>
