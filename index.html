    <script type="text/javascript">
      // Handle GitHub Pages SPA redirect from 404.html
      // This script checks if we're coming from a 404 redirect with ?/
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
        
        // Check for the ?/ pattern from 404.html redirect
        if (location.search.startsWith('/?')) {
          // Extract the path after /?
          var path = location.search.substring(2);
          // Decode the ~and~ back to &
          path = path.replace(/~and~/g, '&');
          // Restore the hash if it was preserved
          var hashMatch = location.hash.match(/^#(.*)/);
          if (hashMatch) {
            path += hashMatch[1];
          }
          // Store in sessionStorage and reload clean
          sessionStorage.redirect = '/25VA251' + (path ? '/' + path : '/');
          history.replaceState(null, null, '/25VA251/');
          location.reload();
        }
      })();
    </script>
